- name: Set up Arch Linux environment for Marius
  hosts: localhost
  become: yes
  vars:
    user_name: "marius"
    group_name: "wheel"
    workspace_dir: "/home/{{ user_name }}/workspace"
    config_dir: "/home/{{ user_name }}/.config"
    bin_dir: "/usr/local/bin"
    packages:
      - arandr
      - autoconf
      - autopep8
      - bash-completion
      - bash-language-server
      - bat
      - btop
      - clang
      - conky
      - curl
      - dmenu
      - docker
      - docker-compose
      - dunst
      - eza
      - fastfetch
      - fd
      - fwupd
      - fzf
      - git
      - go
      - i3
      - i3lock
      - imagemagick
      - kitty
      - kubectl
      - less
      - lua51
      - lua-language-server
      - maim
      - neovim
      - nodejs
      - noto-fonts
      - noto-fonts-emoji
      - openssh
      - pavucontrol
      - pre-commit
      - prettier
      - python-black
      - python-pynvim
      - python3
      - ripgrep
      - rofi
      - rust-analyzer
      - rustup
      - starship
      - stylua
      - tig
      - tmux
      - tree-sitter
      - ttf-jetbrains-mono-nerd
      - ttf-sourcecodepro-nerd
      - unzip
      - xclip
      - brightnessctl
      - tlp
      - xpdf
      - xsel
      - xss-lock
      - yazi
      - zoxide
    yay_packages:
      - aws-cli-v2-bin
      - brave-bin
      - kind
      - kubecolor
      - slack-desktop
      - terraform-docs-bin
      - tfenv
    config_files:
      - {src: "{{ workspace_dir }}/dots/.LESS_TERMCAP", dest: "/home/{{ user_name }}/.LESS_TERMCAP", mode: "0644"}
      - {src: "{{ workspace_dir }}/dots/.Xresources", dest: "/home/{{ user_name }}/.Xresources", mode: "0644"}
      - {src: "{{ workspace_dir }}/dots/.bashrc", dest: "/home/{{ user_name }}/.bashrc", mode: "0644"}
      - {src: "{{ workspace_dir }}/dots/.gitconfig", dest: "/home/{{ user_name }}/.gitconfig", mode: "0644"}
      - {src: "{{ workspace_dir }}/dots/.conkyrc", dest: "/home/{{ user_name }}/.conkyrc", mode: "0644"}
      - {src: "{{ workspace_dir }}/dots/conky-i3bar.sh", dest: "{{ bin_dir }}/conky-i3bar.sh", mode: "0755"}
      - {src: "{{ workspace_dir }}/dots/i3-keyboard-layout", dest: "{{ bin_dir }}/i3-keyboard-layout", mode: "0755"}
      - {src: "{{ workspace_dir }}/dots/i3config", dest: "{{ config_dir }}/i3/config", mode: "0644"}
      - {src: "{{ workspace_dir }}/dots/kitty.conf", dest: "{{ config_dir }}/kitty/kitty.conf", mode: "0644"}
      - {src: "{{ workspace_dir }}/dots/starship.toml", dest: "{{ config_dir }}/starship.toml", mode: "0644"}
      - {src: "{{ workspace_dir }}/dots/rofi-computer", dest: "{{ bin_dir }}/rofi-computer", mode: "0755"}
      - {src: "{{ workspace_dir }}/dots/rofi.config", dest: "{{ config_dir }}/rofi/config", mode: "0644"}
  tasks:
    - name: Ensure required directories exist
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ user_name }}"
        group: "{{ group_name }}"
        mode: "0755"
      loop:
        - "{{ workspace_dir }}"
        - "{{ config_dir }}/kitty"
        - "{{ config_dir }}/rofi"
        - "{{ config_dir }}/i3"
    - name: Install pacman packages
      pacman:
        name: "{{ packages }}"
        state: present
        update_cache: yes
    - name: Clone or update yay
      git:
        repo: https://aur.archlinux.org/yay.git
        dest: "{{ workspace_dir }}/yay"
        update: yes
      become_user: "{{ user_name }}"
    - name: Build yay
      command: makepkg -sf --noconfirm
      args:
        chdir: "{{ workspace_dir }}/yay"
      become_user: "{{ user_name }}"
    - name: Install yay
      shell: pacman -U --noconfirm *.pkg.tar.zst
      args:
        chdir: "{{ workspace_dir }}/yay"
    - name: Install AUR packages
      command: yay -S --noconfirm --needed {{ item }}
      become_user: "{{ user_name }}"
      loop: "{{ yay_packages }}"
      ignore_errors: yes
      when: ansible_facts['service_mgr'] == 'systemd'
    - name: Clone or update dots
      git:
        repo: https://github.com/mariusmagureanu/dots
        dest: "{{ workspace_dir }}/dots"
        update: yes
        version: master
      become_user: "{{ user_name }}"
    - name: Clone or update hecker-vim
      git:
        repo: https://github.com/mariusmagureanu/hecker-vim
        dest: "{{ workspace_dir }}/hecker-vim"
        update: yes
        version: master
      become_user: "{{ user_name }}"
    - name: Create nvim config symlink
      file:
        src: "{{ workspace_dir }}/hecker-vim/nvim"
        dest: "{{ config_dir }}/nvim"
        state: link
        owner: "{{ user_name }}"
        group: "{{ group_name }}"
    - name: Copy configuration files
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: "{{ user_name }}"
        group: "{{ group_name }}"
        mode: "{{ item.mode }}"
      loop: "{{ config_files }}"
    - name: Install rust stable toolchain
      command: rustup default stable
      become_user: "{{ user_name }}"
    - name: Add user to docker group
      user:
        name: "{{ user_name }}"
        groups: docker
        append: yes
    - name: Enable and start services
      systemd:
        name: "{{ item }}"
        enabled: yes
        state: started
      loop:
        - docker
        - sshd
        - tlp
      when: ansible_facts['virtualization_role'] != 'guest' or ansible_facts['service_mgr'] == 'systemd'
    - name: Install krew
      shell: |
        set -e
        cd "$(mktemp -d)"
        OS="$(uname | tr '[:upper:]' '[:lower:]')"
        ARCH="$(uname -m | sed -e 's/x86_64/amd64/' -e 's/aarch64/arm64/')"
        KREW="krew-${OS}_${ARCH}"
        curl -fsSLO "https://github.com/kubernetes-sigs/krew/releases/latest/download/${KREW}.tar.gz"
        tar zxvf "${KREW}.tar.gz"
        ./"${KREW}" install krew
      args:
        creates: "/home/{{ user_name }}/.krew/bin/kubectl-krew"
      become_user: "{{ user_name }}"
